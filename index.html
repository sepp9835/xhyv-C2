<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap">
  <title>XHYVC2</title>
  <style>
    :root {
      --bg:       #0a0c0e;
      --s1:       #0f1215;
      --s2:       #141820;
      --s3:       #1a1f28;
      --b1:       #1e2530;
      --b2:       #28303d;
      --acc:      #c8ff00;
      --acc2:     #9bbf00;
      --acc-dim:  rgba(200,255,0,0.07);
      --red:      #ff5555;
      --yellow:   #ffcc44;
      --green:    #44dd88;
      --blue:     #5599ff;
      --t1:       #dde3ec;
      --t2:       #8a95a3;
      --t3:       #4a5568;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--t1);
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      background: var(--s1);
      border-bottom: 1px solid var(--b1);
      padding: 1.4rem 2rem;
    }
    .header-inner {
      max-width: 1500px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--acc);
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .logo sub {
      font-size: 0.55rem;
      color: var(--t3);
      letter-spacing: 0.1em;
      display: block;
      margin-top: -4px;
      font-weight: 400;
    }
    .header-counts {
      margin-left: auto;
      display: flex;
      gap: 2rem;
    }
    .hcount {
      text-align: right;
    }
    .hcount-num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--t1);
      display: block;
      line-height: 1;
    }
    .hcount-label {
      font-size: 0.68rem;
      color: var(--t3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      max-width: 1500px;
      margin: 0 auto;
      min-height: calc(100vh - 75px);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: var(--s1);
      border-right: 1px solid var(--b1);
      position: sticky;
      top: 0;
      height: calc(100vh - 75px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .sidebar-search {
      padding: 0.85rem;
      border-bottom: 1px solid var(--b1);
    }
    .sidebar-search input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--b2);
      border-radius: 4px;
      font-size: 0.8rem;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--t1);
      outline: none;
    }
    .sidebar-search input:focus { border-color: var(--acc2); }
    .sidebar-search input::placeholder { color: var(--t3); }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
    }
    .sidebar-list::-webkit-scrollbar { width: 3px; }
    .sidebar-list::-webkit-scrollbar-thumb { background: var(--b2); }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.85rem;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.1s;
    }
    .sidebar-item:hover { background: var(--s2); }
    .sidebar-item.active {
      background: var(--acc-dim);
      border-left-color: var(--acc);
    }
    .sidebar-item.hidden { display: none; }
    .sidebar-svc-icon {
      width: 22px; height: 22px;
      border-radius: 4px;
      background: var(--s3);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sidebar-svc-icon img {
      width: 15px; height: 15px;
      object-fit: contain;
      opacity: 0.7;
    }
    .sidebar-svc-fb {
      font-size: 0.5rem;
      font-weight: 600;
      color: var(--acc2);
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
    }
    .sidebar-label {
      font-size: 0.8rem;
      color: var(--t2);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-item.active .sidebar-label { color: var(--t1); }
    .sidebar-proj-count {
      font-size: 0.62rem;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--t3);
    }

    /* ── Main ── */
    .main {
      flex: 1;
      padding: 1.5rem 2rem;
      overflow-x: hidden;
    }

    /* ── Tile Grid (home) ── */
    #homePanel {}
    .grid-label {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--t3);
      font-family: 'IBM Plex Mono', monospace;
      margin-bottom: 1rem;
    }
    .tile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1px;
      border: 1px solid var(--b1);
      border-radius: 6px;
      overflow: hidden;
    }
    .tile {
      background: var(--s1);
      padding: 1.1rem 0.75rem;
      text-align: center;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 110px;
      transition: background 0.12s;
      border-right: 1px solid var(--b1);
      border-bottom: 1px solid var(--b1);
    }
    .tile:hover { background: var(--s2); }
    .tile.hidden { display: none; }
    .tile img {
      width: 32px; height: 32px;
      object-fit: contain;
      margin-bottom: 0.5rem;
      opacity: 0.75;
    }
    .tile-text {
      font-size: 0.75rem;
      color: var(--t2);
      line-height: 1.3;
    }
    .tile-fb {
      width: 32px; height: 32px;
      border-radius: 5px;
      background: var(--s3);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.62rem; font-weight: 600;
      color: var(--acc2);
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    /* ── Detail Panel ── */
    #detailPanel { display: none; }

    .back-btn {
      display: inline-block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      color: var(--t3);
      cursor: pointer;
      margin-bottom: 1.2rem;
      letter-spacing: 0.04em;
    }
    .back-btn:hover { color: var(--t1); }

    .detail-top {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1.4rem;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--b1);
    }
    .detail-top-icon {
      width: 44px; height: 44px;
      border-radius: 8px;
      background: var(--s2);
      border: 1px solid var(--b1);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .detail-top-icon img { width: 28px; height: 28px; object-fit: contain; opacity: 0.8; }
    .detail-top-icon-fb {
      font-size: 0.75rem; font-weight: 600;
      color: var(--acc2);
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
    }
    .detail-top-info h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--t1);
      text-transform: capitalize;
      line-height: 1.2;
    }
    .detail-top-meta {
      font-size: 0.72rem;
      color: var(--t3);
      font-family: 'IBM Plex Mono', monospace;
      margin-top: 0.3rem;
    }
    .detail-copy-btn {
      margin-left: auto;
      padding: 0.4rem 0.9rem;
      background: var(--s2);
      border: 1px solid var(--b2);
      border-radius: 4px;
      font-size: 0.72rem;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--t2);
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .detail-copy-btn:hover { border-color: var(--t3); color: var(--t1); }
    .detail-copy-btn.copied { border-color: var(--green); color: var(--green); }

    /* ── AV Risk Score ── */
    .risk-block {
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: 6px;
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .risk-header {
      padding: 0.7rem 1rem;
      background: var(--s2);
      border-bottom: 1px solid var(--b1);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .risk-header-label {
      font-size: 0.7rem;
      font-weight: 600;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--t2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .risk-header-label span {
      color: var(--t3);
      font-weight: 400;
    }
    .risk-body {
      padding: 1rem;
    }
    .risk-score-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.9rem;
    }
    .risk-num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 2.2rem;
      font-weight: 600;
      line-height: 1;
      width: 52px;
      flex-shrink: 0;
    }
    .risk-num.safe   { color: var(--green); }
    .risk-num.medium { color: var(--yellow); }
    .risk-num.risky  { color: var(--red); }
    .risk-bar-col {
      flex: 1;
    }
    .risk-bar-track {
      height: 5px;
      background: var(--b2);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 0.3rem;
    }
    .risk-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .risk-bar-fill.safe   { background: var(--green); }
    .risk-bar-fill.medium { background: var(--yellow); }
    .risk-bar-fill.risky  { background: var(--red); }
    .risk-verdict {
      font-size: 0.72rem;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--t3);
      letter-spacing: 0.04em;
    }
    .risk-verdict.safe   { color: var(--green); }
    .risk-verdict.medium { color: var(--yellow); }
    .risk-verdict.risky  { color: var(--red); }
    .risk-reason {
      font-size: 0.82rem;
      color: var(--t2);
      line-height: 1.65;
      border-top: 1px solid var(--b1);
      padding-top: 0.75rem;
    }
    .risk-av-row {
      margin-top: 0.75rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .risk-av-tag {
      font-size: 0.62rem;
      font-family: 'IBM Plex Mono', monospace;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      border: 1px solid var(--b2);
      color: var(--t3);
    }
    .risk-av-tag.detect { border-color: #ff555544; color: var(--red); background: #ff555510; }
    .risk-av-tag.partial { border-color: #ffcc4444; color: var(--yellow); background: #ffcc4410; }
    .risk-av-tag.miss { border-color: #44dd8844; color: var(--green); background: #44dd8810; }

    /* ── Stats ── */
    .stats-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .stat-pill {
      padding: 0.4rem 0.85rem;
      background: var(--s2);
      border: 1px solid var(--b1);
      border-radius: 4px;
      font-size: 0.72rem;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--t2);
    }
    .stat-pill strong {
      color: var(--t1);
      font-weight: 600;
    }

    /* ── Section Cards ── */
    .sec-card {
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 0.75rem;
    }
    .sec-head {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1rem;
      background: var(--s2);
      border-bottom: 1px solid var(--b1);
      cursor: pointer;
      user-select: none;
    }
    .sec-head:hover { background: var(--s3); }
    .sec-head-label {
      font-size: 0.72rem;
      font-weight: 600;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--t2);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .sec-cnt {
      margin-left: auto;
      font-size: 0.62rem;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--t3);
      background: var(--s3);
      padding: 0.08rem 0.4rem;
      border-radius: 2px;
    }
    .sec-chev {
      font-size: 0.55rem;
      color: var(--t3);
      transition: transform 0.18s;
      margin-left: 0.25rem;
    }
    .sec-head.collapsed .sec-chev { transform: rotate(-90deg); }
    .sec-body.collapsed { display: none; }

    /* ── Projects ── */
    .proj-item {
      display: flex;
      align-items: center;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--b1);
      transition: background 0.08s;
    }
    .proj-item:last-child { border-bottom: none; }
    .proj-item:hover { background: var(--s2); }
    .proj-item a {
      color: var(--blue);
      text-decoration: none;
      font-size: 0.78rem;
      font-family: 'IBM Plex Mono', monospace;
      word-break: break-all;
    }
    .proj-item a:hover { text-decoration: underline; }

    /* ── Detection items ── */
    .det-group-head {
      padding: 0.38rem 1rem;
      background: var(--s2);
      border-bottom: 1px solid var(--b1);
      font-size: 0.62rem;
      font-weight: 600;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .det-item {
      display: flex;
      align-items: flex-start;
      gap: 0.45rem;
      padding: 0.45rem 1rem 0.45rem 1.1rem;
      border-bottom: 1px solid var(--b1);
      font-size: 0.8rem;
    }
    .det-item:last-child { border-bottom: none; }
    .det-tag {
      flex-shrink: 0;
      font-size: 0.55rem;
      font-weight: 700;
      padding: 0.1rem 0.3rem;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-family: 'IBM Plex Mono', monospace;
      margin-top: 0.18rem;
      border: 1px solid;
    }
    .tag-url     { color: #5599ff; border-color: #5599ff44; background: #5599ff0e; }
    .tag-ua      { color: var(--red); border-color: #ff555544; background: #ff55550e; }
    .tag-file    { color: var(--yellow); border-color: #ffcc4444; background: #ffcc440e; }
    .tag-process { color: #bb88ff; border-color: #bb88ff44; background: #bb88ff0e; }
    .tag-logic   { color: var(--green); border-color: #44dd8844; background: #44dd880e; }
    .tag-ref     { color: var(--t3); border-color: var(--b2); background: var(--s3); }
    .tag-other   { color: var(--t3); border-color: var(--b2); background: var(--s3); }
    .det-tool {
      font-size: 0.58rem;
      font-weight: 600;
      padding: 0.06rem 0.28rem;
      border-radius: 2px;
      background: var(--s3);
      color: var(--t3);
      font-family: 'IBM Plex Mono', monospace;
      flex-shrink: 0;
      margin-top: 0.18rem;
      border: 1px solid var(--b2);
    }
    .det-val {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      word-break: break-all;
      color: var(--t2);
      line-height: 1.5;
    }
    .det-txt {
      font-size: 0.8rem;
      color: var(--t2);
      line-height: 1.6;
      word-break: break-word;
    }
    .det-val a, .det-txt a { color: var(--blue); text-decoration: none; }
    .det-val a:hover, .det-txt a:hover { text-decoration: underline; }

    .http-pill {
      display: inline-block;
      font-size: 0.55rem; font-weight: 700;
      padding: 0.06rem 0.26rem;
      border-radius: 2px;
      margin-right: 0.18rem;
      font-family: 'IBM Plex Mono', monospace;
      vertical-align: middle;
      border: 1px solid;
    }
    .http-get    { color: var(--green);  border-color: #44dd8844; background: #44dd880e; }
    .http-post   { color: #5599ff; border-color: #5599ff44; background: #5599ff0e; }
    .http-put    { color: var(--yellow); border-color: #ffcc4444; background: #ffcc440e; }
    .http-delete { color: var(--red); border-color: #ff555544; background: #ff55550e; }
    .http-head   { color: #bb88ff; border-color: #bb88ff44; background: #bb88ff0e; }
    .http-other  { color: var(--t3); border-color: var(--b2); background: var(--s3); }

    /* ── Description ── */
    .desc-body {
      padding: 1rem;
      font-size: 0.85rem;
      color: var(--t2);
      line-height: 1.75;
    }
    .desc-body h1,.desc-body h2,.desc-body h3,
    .desc-body h4,.desc-body h5,.desc-body h6 {
      margin: 1rem 0 0.4rem;
      color: var(--t1); font-weight: 600;
    }
    .desc-body p { margin: 0.4rem 0; }
    .desc-body img { max-width:100%; border-radius:4px; margin:0.6rem 0; border:1px solid var(--b1); }
    .desc-body a { color: var(--blue); text-decoration: none; }
    .desc-body a:hover { text-decoration: underline; }
    .desc-body ul,.desc-body ol { margin: 0.3rem 0 0.3rem 1.3rem; }
    .desc-body li { margin: 0.2rem 0; }
    .desc-body code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8em;
      background: var(--s3);
      color: var(--acc2);
      padding: 0.1rem 0.3rem;
      border-radius: 2px;
    }
    .desc-body pre {
      background: var(--s2);
      border: 1px solid var(--b1);
      border-radius: 4px;
      padding: 0.8rem;
      margin: 0.6rem 0;
      overflow-x: auto;
    }
    .desc-body pre code { background: none; padding: 0; color: var(--t1); }
    .desc-body blockquote {
      border-left: 2px solid var(--b2);
      padding: 0.3rem 0.8rem;
      margin: 0.6rem 0;
      color: var(--t3);
      background: var(--s2);
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 2px; }

    @media (max-width: 860px) {
      .sidebar { width: 200px; }
      .header-counts { gap: 1rem; }
    }
    @media (max-width: 640px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid var(--b1); }
      .sidebar-list { max-height: 180px; }
      .main { padding: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      XHYVC2
      <sub>living off the land c2 index</sub>
    </div>
    <div class="header-counts">
      <div class="hcount">
        <span class="hcount-num" id="hcServices">—</span>
        <span class="hcount-label">Services</span>
      </div>
      <div class="hcount">
        <span class="hcount-num" id="hcProjects">—</span>
        <span class="hcount-label">C2 Projects</span>
      </div>
      <div class="hcount">
        <span class="hcount-num" id="hcRules">—</span>
        <span class="hcount-label">Detection Rules</span>
      </div>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="filter..." autocomplete="off">
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </aside>

  <main class="main">
    <div id="homePanel">
      <div class="grid-label" id="gridLabel">loading...</div>
      <div class="tile-grid" id="tileGrid"></div>
    </div>

    <div id="detailPanel">
      <div class="back-btn" onclick="goBack()">&larr; index</div>

      <div class="detail-top">
        <div class="detail-top-icon" id="detailIconWrap"></div>
        <div class="detail-top-info">
          <h2 id="detailTitle"></h2>
          <div class="detail-top-meta" id="detailMeta"></div>
        </div>
        <button class="detail-copy-btn" onclick="copyLink()">copy link</button>
      </div>

      <div class="stats-row" id="statsRow"></div>
      <div id="riskBlock"></div>
      <div id="detailContent"></div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  let c2Data = {};

  /* ─── AV Risk Score Database ─── */
  const avRisk = {
    "telegram": {
      score: 4,
      reason: "Telegram's bot API is widely used in legitimate automation. Most AV solutions and EDRs won't block outbound HTTPS to api.telegram.org by default. However, Defender for Endpoint and CrowdStrike have behavioral rules that flag non-browser processes polling /getUpdates at fixed intervals, particularly powershell.exe or unknown binaries. Detection rate has increased since 2023 with well-known implants like NineRAT and Lazarus campaigns.",
      av: [
        { name: "Windows Defender", rating: "partial" },
        { name: "CrowdStrike", rating: "detect" },
        { name: "SentinelOne", rating: "partial" },

  /* ─── Detection classifier (same logic) ─── */
  function classifyDetection(raw) {
    const s = raw.trim();
    let tool = null;
    const tm = s.match(/^\[([^\]]+)\]\s*/);
    if (tm) tool = tm[1];
    let clean = tm ? s.slice(tm[0].length) : s;
    if (/^(detection blog|blog|source|detection patterns)[:\s]/i.test(clean) ||
        (/^https?:\/\//i.test(clean) && /(blog|medium|research|github\.com\/mthcht|x\.com\/)/i.test(clean))) {
      return { type: 'reference', tool, value: clean };
    }
    if (/^(detection (strategy|logic)|comment)[:\s]/i.test(clean) ||
        /^(high-frequency|unusual |repeated |anomalous |rare |excessive |presence of |base64)/i.test(clean)) {
      return { type: 'logic', tool, value: clean.replace(/^(detection (strategy|logic)|comment)[:\s]*/i, '') };
    }
    if (/user-?agent/i.test(clean.toLowerCase())) {
      const m = clean.match(/user-?agent[:\s]*(.+)/i);
      return { type: 'useragent', tool, value: m ? m[1].trim() : clean };
    }
    if (/^file [:\s]/i.test(clean) || /^file (created|name)[:\s]/i.test(clean)) {
      return { type: 'file', tool, value: clean.replace(/^file[:\s]*/i, '') };
    }
    if (/^process\s*[-:]/i.test(clean)) {
      return { type: 'process', tool, value: clean.replace(/^process\s*[-:\s]*/i, '') };
    }
    const mm = clean.match(/^((?:GET|POST|PUT|DELETE|HEAD|PATCH)\s*(?:&\s*(?:GET|POST|PUT|DELETE|HEAD|PATCH)\s*)*)[-\s]*[-:]\s*/i);
    let method = null, urlClean = clean;
    if (mm) { method = mm[1].replace(/\s+/g,'').toUpperCase(); urlClean = clean.slice(mm[0].length); }
    if (/^url[:\s]+/i.test(urlClean)) urlClean = urlClean.replace(/^url[:\s]+/i,'').trim();
    if (/^https?:\/\//i.test(urlClean) || /^\*[.\/:]/.test(urlClean) || /^url[:\s]/i.test(clean)) {
      return { type: 'network', tool, method, value: urlClean };
    }
    if (/https?:\/\//i.test(clean)) return { type: 'network', tool, method, value: urlClean };
    return { type: 'other', tool, value: clean };
  }

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function linkify(t) { return t.replace(/(https?:\/\/[^\s<>]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>'); }

  function pill(method) {
    if (!method) return '';
    return method.split('&').map(m => {
      const c = {GET:'http-get',POST:'http-post',PUT:'http-put',DELETE:'http-delete',HEAD:'http-head',PATCH:'http-other'}[m]||'http-other';
      return `<span class="http-pill ${c}">${m}</span>`;
    }).join('');
  }

  const TYPE_META = {
    network:   { label:'Network Indicators', tag:'URL',   cls:'tag-url' },
    useragent: { label:'User-Agent Strings', tag:'UA',    cls:'tag-ua' },
    file:      { label:'File Artifacts',     tag:'FILE',  cls:'tag-file' },
    process:   { label:'Process Indicators', tag:'PROC',  cls:'tag-process' },
    logic:     { label:'Detection Logic',    tag:'LOGIC', cls:'tag-logic' },

  function buildDetection(dets) {
    const classified = dets.map(classifyDetection);
    const order = ['network','useragent','file','process','logic','reference','other'];
    const g = {}; order.forEach(t => g[t] = []);
    classified.forEach(d => g[d.type].push(d));
    let html = '';
    order.forEach(type => {
      if (!g[type].length) return;
      const m = TYPE_META[type];
      html += `<div class="det-group-head">${m.label} (${g[type].length})</div>`;
      g[type].forEach(d => {
        const tag = `<span class="det-tag ${m.cls}">${m.tag}</span>`;
        const tool = d.tool ? `<span class="det-tool">${d.tool}</span>` : '';
        if (d.type === 'network') {
          html += `<div class="det-item">${tag}${tool}<span class="det-val">${pill(d.method)}${linkify(esc(d.value))}</span></div>`;
        } else if (d.type === 'logic' || d.type === 'other' || d.type === 'reference') {
          html += `<div class="det-item">${tag}${tool}<span class="det-txt">${linkify(esc(d.value))}</span></div>`;
        } else {
          html += `<div class="det-item">${tag}${tool}<span class="det-val">${linkify(esc(d.value))}</span></div>`;
        }
      });
    });
    return html;
  }

  /* ─── Risk block renderer ─── */
  function renderRisk(serviceName) {
    const r = avRisk[serviceName];
    if (!r) return '';
    const score = r.score;
    const pct = (score / 10) * 100;
    const cls = score <= 4 ? 'risky' : score <= 6 ? 'medium' : 'safe';
    const verdict = score <= 4 ? 'high detection risk' : score <= 6 ? 'moderate detection risk' : 'low detection risk';
    const avHtml = r.av.map(a => `<span class="risk-av-tag ${a.rating}">${a.name}</span>`).join('');
    return `<div class="risk-block">
      <div class="risk-header">
        <span class="risk-header-label">AV Detection Risk <span>— evasion score 1-10</span></span>
      </div>
      <div class="risk-body">
        <div class="risk-score-row">
          <div class="risk-num ${cls}">${score}</div>
          <div class="risk-bar-col">
            <div class="risk-bar-track"><div class="risk-bar-fill ${cls}" style="width:${pct}%"></div></div>
            <div class="risk-verdict ${cls}">${verdict}</div>
          </div>
        </div>
        <div class="risk-reason">${r.reason}</div>
        <div class="risk-av-row">${avHtml}</div>
      </div>
    </div>`;
  }

  /* ─── Slug/routing ─── */
  function toSlug(n) { return encodeURIComponent(n.toLowerCase().replace(/\s+/g,'-')); }
  let slugToName = {};
  function buildSlugs(services) { slugToName={}; services.forEach(n => slugToName[toSlug(n)]=n); }

  function fbText(name) {
    const w = name.trim().split(/\s+/);
    return w.length > 1 ? w[0][0]+w[1][0] : name.substring(0,2);
  }

  /* ─── Load ─── */
  function load() {
    fetch(`c2_data.json?t=${Date.now()}`,{cache:'no-store'})
      .then(r=>r.json())
      .then(data=>{
        c2Data = data;
        const svcs = Object.keys(data);
        buildSlugs(svcs);
        let tp=0,tr=0;
        svcs.forEach(s=>{ tp+=(data[s].c2Projects||[]).length; tr+=(data[s].detection||[]).length; });
        document.getElementById('hcServices').textContent = svcs.length;
        document.getElementById('hcProjects').textContent = tp;
        document.getElementById('hcRules').textContent = tr;
        document.getElementById('gridLabel').textContent = svcs.length + ' services indexed';
        buildSidebar(svcs);
        buildTiles(svcs);
        handleRoute();
      });
  }

  function buildSidebar(svcs) {
    const list = document.getElementById('sidebarList');
    svcs.forEach(s => {
      const item = document.createElement('div');
      item.className = 'sidebar-item';
      item.setAttribute('data-service', s);
      item.setAttribute('data-search', s.toLowerCase());

      const iconWrap = document.createElement('div');
      iconWrap.className = 'sidebar-svc-icon';
      const src = serviceIcons[s];
      if (src) {
        const img = document.createElement('img');
        img.src = src; img.alt = s;
        img.onerror = () => { img.style.display='none'; const fb=document.createElement('span'); fb.className='sidebar-svc-fb'; fb.textContent=fbText(s); iconWrap.appendChild(fb); };
        iconWrap.appendChild(img);
      } else {
        const fb = document.createElement('span'); fb.className='sidebar-svc-fb'; fb.textContent=fbText(s);
        iconWrap.appendChild(fb);
      }

      const label = document.createElement('div'); label.className='sidebar-label'; label.textContent=s;
      const cnt = (c2Data[s].c2Projects||[]).length;
      const cntEl = document.createElement('div'); cntEl.className='sidebar-proj-count'; cntEl.textContent=cnt;

      item.appendChild(iconWrap); item.appendChild(label); item.appendChild(cntEl);
      item.addEventListener('click',()=>{ window.location.hash=toSlug(s); });
      list.appendChild(item);
    });
  }

  function buildTiles(svcs) {
    const grid = document.getElementById('tileGrid');
    svcs.forEach(s => {
      const tile = document.createElement('div');
      tile.className='tile';
      tile.setAttribute('data-service',s);
      tile.setAttribute('data-search',s.toLowerCase());
      const src = serviceIcons[s];
      if (src) {
        const img = document.createElement('img'); img.src=src; img.alt=s; img.loading='lazy';
        img.onerror=()=>{ img.style.display='none'; const fb=document.createElement('div'); fb.className='tile-fb'; fb.textContent=fbText(s); tile.insertBefore(fb,img); };
        tile.appendChild(img);
      } else {
        const fb = document.createElement('div'); fb.className='tile-fb'; fb.textContent=fbText(s);
        tile.appendChild(fb);
      }
      const lbl = document.createElement('div'); lbl.className='tile-text'; lbl.textContent=s;
      tile.appendChild(lbl);
      tile.addEventListener('click',()=>{ window.location.hash=toSlug(s); });
      grid.appendChild(tile);
    });
  }

  document.addEventListener('DOMContentLoaded',()=>{
    document.getElementById('searchInput').addEventListener('input',function(){
      const q=this.value.toLowerCase().trim();
      document.querySelectorAll('.tile,.sidebar-item').forEach(el=>{
        el.classList.toggle('hidden', q && !el.getAttribute('data-search').includes(q));
      });
    });
  });

  window.addEventListener('hashchange', handleRoute);

  function handleRoute() {
    const hash = window.location.hash.slice(1);
    if (!hash) { goBackSilent(); return; }
    const decoded = decodeURIComponent(hash);
    if (slugToName[decoded]) { showDetail(slugToName[decoded]); return; }
    for (const [slug,name] of Object.entries(slugToName)) {
      if (slug.toLowerCase() === decoded.toLowerCase()) { showDetail(name); return; }
    }
    goBackSilent();
  }

  let currentService = null;

  async function showDetail(name) {
    currentService = name;
    document.getElementById('homePanel').style.display='none';
    document.getElementById('detailPanel').style.display='block';
    document.querySelectorAll('.sidebar-item').forEach(el=>{
      el.classList.toggle('active', el.getAttribute('data-service')===name);
    });
    const active = document.querySelector('.sidebar-item.active');
    if (active) active.scrollIntoView({block:'nearest'});

    // icon
    const iconWrap = document.getElementById('detailIconWrap');
    iconWrap.innerHTML='';
    const src = serviceIcons[name];
    if (src) {
      const img = document.createElement('img'); img.src=src; img.alt=name;
      img.style.width='28px'; img.style.height='28px'; img.style.objectFit='contain'; img.style.opacity='0.85';
      img.onerror=()=>{ img.style.display='none'; const fb=document.createElement('div'); fb.className='detail-top-icon-fb'; fb.textContent=fbText(name); iconWrap.appendChild(fb); };
      iconWrap.appendChild(img);
    } else {
      const fb=document.createElement('div'); fb.className='detail-top-icon-fb'; fb.textContent=fbText(name);
      iconWrap.appendChild(fb);
    }

    document.getElementById('detailTitle').textContent=name;
    const info = c2Data[name];
    if (!info) return;
    document.title = name + ' — XHYVC2';

    const pc=(info.c2Projects||[]).length;
    const dc=(info.detection||[]).length;
    const classified=(info.detection||[]).map(classifyDetection);
    const nc=classified.filter(d=>d.type==='network').length;
    const lc=classified.filter(d=>d.type==='logic').length;

    document.getElementById('detailMeta').textContent=`${pc} c2 project${pc!==1?'s':''} · ${dc} detection rule${dc!==1?'s':''}`;

    let statsHtml=`<div class="stat-pill"><strong>${pc}</strong> c2 projects</div><div class="stat-pill"><strong>${dc}</strong> detection rules</div>`;
    if(nc>0) statsHtml+=`<div class="stat-pill"><strong>${nc}</strong> network iocs</div>`;
    if(lc>0) statsHtml+=`<div class="stat-pill"><strong>${lc}</strong> logic rules</div>`;
    document.getElementById('statsRow').innerHTML=statsHtml;

    document.getElementById('riskBlock').innerHTML=renderRisk(name);

    let projHtml=`<div class="sec-card"><div class="sec-head" id="sh-proj" onclick="toggleSec('sh-proj')"><span class="sec-head-label">c2 projects</span><span class="sec-cnt">${pc}</span><span class="sec-chev">&#9660;</span></div><div class="sec-body">`;
    (info.c2Projects||[]).forEach(u=>{ projHtml+=`<div class="proj-item"><a href="${esc(u)}" target="_blank" rel="noopener">${esc(u)}</a></div>`; });
    projHtml+=`</div></div>`;

    let detHtml=`<div class="sec-card"><div class="sec-head" id="sh-det" onclick="toggleSec('sh-det')"><span class="sec-head-label">detection indicators</span><span class="sec-cnt">${dc}</span><span class="sec-chev">&#9660;</span></div><div class="sec-body">`;
    detHtml+=buildDetection(info.detection||[]);
    detHtml+=`</div></div>`;

    document.getElementById('detailContent').innerHTML=projHtml+detHtml+'<div id="descTarget"></div>';

    const descTarget=document.getElementById('descTarget');
    let md=null;
    if (info.descriptionUrl) {
      try { const r=await fetch(info.descriptionUrl); if(r.ok) md=await r.text(); } catch(e){}
    } else if (info.description) { md=info.description; }
    if (md) {
      descTarget.innerHTML=`<div class="sec-card"><div class="sec-head" id="sh-desc" onclick="toggleSec('sh-desc')"><span class="sec-head-label">description & analysis</span><span class="sec-chev">&#9660;</span></div><div class="sec-body"><div class="desc-body">${marked.parse(md)}</div></div></div>`;
    }

    window.scrollTo({top:0,behavior:'smooth'});
  }

  function toggleSec(id) {
    const h=document.getElementById(id);
    h.classList.toggle('collapsed');
    h.nextElementSibling.classList.toggle('collapsed');
  }

  function goBack() { window.location.hash=''; }
  function goBackSilent() {
    currentService=null;
    document.title='XHYVC2';
    document.getElementById('homePanel').style.display='block';
    document.getElementById('detailPanel').style.display='none';
    document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active'));
  }

  function copyLink() {
    if (!currentService) return;
    const url=window.location.origin+window.location.pathname+'#'+toSlug(currentService);
    navigator.clipboard.writeText(url).then(()=>{
      const btn=document.querySelector('.detail-copy-btn');
      btn.textContent='copied'; btn.classList.add('copied');
      setTimeout(()=>{ btn.textContent='copy link'; btn.classList.remove('copied'); },2000);
    }).catch(()=>{});
  }

  marked.setOptions({gfm:true,breaks:true});
  load();
</script>
</body>
</html>
